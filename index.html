<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>谷子的家 — 电子吧唧收纳册</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <nav id="top-nav">
    <div class="nav-brand">🎀 谷子的家</div>
    <div class="nav-modes">
      <button class="mode-btn active" data-mode="album">📖 收纳册</button>
      <button class="mode-btn" data-mode="desk">🖼️ 痛桌</button>
      <button class="mode-btn" data-mode="desktop">🖥️ 桌面</button>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main id="main-area">
    <!-- 收纳册模式 -->
    <section id="album-mode" class="mode-view active">
      <div class="album-container">
        <div class="book">
          <div class="page left-page" id="left-page"></div>
          <div class="book-spine"></div>
          <div class="page right-page" id="right-page"></div>
        </div>
        <div class="album-controls">
          <button id="prev-page" class="page-btn">◀ 上一页</button>
          <span id="page-num">第 1 页</span>
          <button id="next-page" class="page-btn">下一页 ▶</button>
        </div>
      </div>
    </section>

    <!-- 痛桌模式 -->
    <section id="desk-mode" class="mode-view">
      <div class="desk-bg" id="desk-bg"></div>
      <div class="desk-surface" id="desk-surface"></div>
      <div class="desk-hint">💡 拖拽吧唧自由摆放，双击查看详情</div>
    </section>

    <!-- 桌面模式 -->
    <section id="desktop-mode" class="mode-view">
      <div class="wallpaper" id="wallpaper"></div>
      <div class="widgets-layer">
        <!-- 时钟 -->
        <div class="widget clock-widget">
          <div class="clock-face">
            <div class="clock-hand hour" id="hour-hand"></div>
            <div class="clock-hand minute" id="minute-hand"></div>
            <div class="clock-hand second" id="second-hand"></div>
            <div class="clock-center"></div>
          </div>
          <div class="digital-time" id="digital-time">12:00</div>
        </div>
        <!-- 日历 -->
        <div class="widget calendar-widget">
          <div class="cal-header" id="cal-month">2026年7月</div>
          <div class="cal-body" id="cal-body"></div>
        </div>
        <!-- 便签 -->
        <div class="widget sticky-widget">
          <div class="sticky-header">📝 便签</div>
          <textarea class="sticky-content" placeholder="写下今天的心情..."></textarea>
        </div>
        <!-- 快捷链接 -->
        <div class="widget links-widget">
          <div class="link-item" onclick="window.open('https://www.bilibili.com','_blank')">📺 B站</div>
          <div class="link-item" onclick="window.open('https://www.weibo.com','_blank')">📱 微博</div>
          <div class="link-item" onclick="window.open('https://www.pixiv.net','_blank')">🎨 Pixiv</div>
          <div class="link-item" onclick="window.open('https://github.com','_blank')">🐙 GitHub</div>
        </div>
      </div>
      <div class="wallpaper-selector">
        <div class="wp-thumb" data-wp="spring" style="background-image:url('assets/386f7216-b23e-4bb4-8d05-8b28ffb0b1d5_春季背景图.png')"></div>
        <div class="wp-thumb" data-wp="summer" style="background-image:url('assets/bc30e759-542c-40cd-a653-74ee7ad280b2_夏季背景图.png')"></div>
        <div class="wp-thumb" data-wp="autumn" style="background-image:url('assets/e0018974-9664-4694-b237-ddd431d7f9d8_秋季背景图.png')"></div>
        <div class="wp-thumb" data-wp="winter" style="background-image:url('assets/c8911682-29e7-41c7-8ade-c8d9fe84e234_冬季背景图.png')"></div>
      </div>
    </section>
  </main>

  <!-- 吧唧详情弹窗 -->
  <div id="badge-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">×</button>
      <div class="modal-badge-large" id="modal-badge"></div>
      <h3 id="modal-name"></h3>
      <p id="modal-rarity"></p>
      <p id="modal-desc"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
